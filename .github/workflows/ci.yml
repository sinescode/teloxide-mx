# Optimized Continuous Integration for teloxide_max
#
# Goals:
# - Fast PR feedback (stable-only tests + lint + docs)
# - Full coverage on main/master and manual runs (stable/beta/nightly/MSRV)
# - Cancel stale runs; drop useless cache / double-compiles
# - modern Actions (checkout@v4, sparse index, alpine postgres)

name: Continuous integration

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: "--cfg CI_REDIS --cfg CI_POSTGRES -Dwarnings"
  RUSTDOCFLAGS: "--cfg docsrs -Dwarnings"
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUSTUP_MAX_RETRIES: 10
  # Keep in sync with rust-toolchain.toml
  rust_nightly: nightly-2025-06-12
  rust_msrv: "1.85.0"
  CI: 1

jobs:
  # ---------------------------------------------------------------------------
  # Build the test matrix once (PR = stable only; main = full)
  # ---------------------------------------------------------------------------
  matrix:
    name: plan matrix
    runs-on: ubuntu-latest
    outputs:
      test: ${{ steps.gen.outputs.test }}
    steps:
      - id: gen
        run: |
          # PR / merge queue: fast path. Push main + manual: full toolchains.
          if [ "${{ github.event_name }}" = "pull_request" ] \
             || [ "${{ github.event_name }}" = "merge_group" ]; then
            echo 'test={"include":[{"rust":"stable","toolchain":"stable","features":"--features full"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'test={"include":[{"rust":"stable","toolchain":"stable","features":"--features full"},{"rust":"beta","toolchain":"beta","features":"--features full"},{"rust":"nightly","toolchain":"nightly-2025-06-12","features":"--features full --features nightly"},{"rust":"msrv","toolchain":"1.85.0","features":"--features full"}]}' >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Gate: required status check for branch protection
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI succeeded
    runs-on: ubuntu-latest
    if: always()
    needs: [matrix, fmt, test, check-examples, clippy, doc]
    steps:
      - name: Check whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  # ---------------------------------------------------------------------------
  # Format — rustfmt only (no dep graph, no rust-cache)
  # ---------------------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.rust_nightly }} (rustfmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.rust_nightly }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Tests (matrix from planner)
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.rust }})
    needs: matrix
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teloxide_max
          POSTGRES_PASSWORD: rewrite_it_in_rust
        options: >-
          --health-cmd "pg_isready -U teloxide_max"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.test) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.rust }}
          cache-on-failure: true

      # Keep lockfile MSRV-friendly: some crates (darling 0.23 via serde_with_macros
      # 3.21, home 0.5.12, ar_archive_writer 0.5) require rustc 1.88+.
      - name: Downgrade deps for MSRV
        if: matrix.rust == 'msrv'
        run: |
          set -euo pipefail
          cargo +${{ matrix.toolchain }} update -p serde_with --precise 3.14.0
          cargo +${{ matrix.toolchain }} update -p serde_with_macros --precise 3.14.0
          cargo +${{ matrix.toolchain }} update -p home --precise 0.5.11
          cargo +${{ matrix.toolchain }} update -p ar_archive_writer --precise 0.4.2 \
            || cargo +${{ matrix.toolchain }} update -p psm --precise 0.1.21 \
            || true


      - name: Install redis + psql
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            redis-server postgresql-client
          redis-server --port 7777 --daemonize yes --save ""
          redis-server --port 7778 --daemonize yes --save ""
          redis-server --port 7779 --daemonize yes --save ""

      - name: Create PostgreSQL databases
        env:
          PGPASSWORD: rewrite_it_in_rust
        run: |
          for db in test_postgres_json test_postgres_bincode test_postgres_cbor; do
            psql -h localhost -U teloxide_max -tc \
              "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1 \
              || psql -h localhost -U teloxide_max -c "CREATE DATABASE $db;"
          done

      # One cargo invocation: compile + run (no separate --no-run pass)
      - name: Unit & integration tests
        run: cargo +${{ matrix.toolchain }} test --tests --workspace ${{ matrix.features }}

      - name: Documentation tests
        if: matrix.rust != 'msrv'
        run: cargo +${{ matrix.toolchain }} test --doc --workspace ${{ matrix.features }}

  # ---------------------------------------------------------------------------
  # Examples + minimal feature set (stable)
  # ---------------------------------------------------------------------------
  check-examples:
    name: check examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-examples
          cache-on-failure: true

      - name: Check examples (full)
        run: cargo +stable check --workspace --examples --features full

      - name: Check no default features
        run: cargo +stable check --workspace --no-default-features

  # ---------------------------------------------------------------------------
  # Clippy (nightly; matches rust-toolchain.toml)
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.rust_nightly }} (clippy)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.rust_nightly }}
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          cache-on-failure: true

      - name: clippy
        # -Dwarnings already in RUSTFLAGS
        run: cargo clippy --workspace --all-targets --features full --features nightly

  # ---------------------------------------------------------------------------
  # Docs (nightly; `cargo docs` alias in .cargo/config.toml)
  # ---------------------------------------------------------------------------
  doc:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.rust_nightly }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.rust_nightly }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: doc
          cache-on-failure: true

      - name: rustdoc
        run: cargo docs
